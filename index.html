<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบสั่งอาหาร - สวนอาหาร 20 เหรียญ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #f59e0b;
            --primary-hover: #d97706;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --danger-color: #ef4444;
            --success-color: #10b981;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Kanit', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: linear-gradient(135deg, #1e293b, #0f172a); color: white; padding: 1.2rem 2rem; text-align: center; box-shadow: var(--shadow-md); z-index: 10; }
        header h1 { font-size: 1.8rem; font-weight: 600; color: var(--primary-color); letter-spacing: 0.5px; }

        .container { display: flex; flex: 1; overflow: hidden; }

        .sidebar { width: 260px; background: var(--card-bg); padding: 1.5rem 1rem; overflow-y: auto; box-shadow: 2px 0 5px rgba(0,0,0,0.02); z-index: 5; }
        .sidebar h2 { font-size: 1.2rem; margin-bottom: 1.5rem; color: var(--text-main); padding-left: 0.5rem; border-left: 4px solid var(--primary-color); }
        .category-btn { display: block; width: 100%; text-align: left; padding: 0.8rem 1rem; margin-bottom: 0.5rem; background: transparent; border: 1px solid transparent; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; font-size: 1rem; color: var(--text-muted); font-weight: 400; }
        .category-btn:hover { background-color: #fef3c7; color: var(--primary-hover); }
        .category-btn.active { background-color: var(--primary-color); color: white; font-weight: 500; box-shadow: var(--shadow-md); }

        .main-content { flex: 1; padding: 2rem; overflow-y: auto; background-color: var(--bg-color); }
        .main-content h2 { font-size: 1.6rem; margin-bottom: 1.5rem; color: var(--text-main); font-weight: 600; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem; }

        .category-section-title { grid-column: 1 / -1; font-size: 1.3rem; color: var(--text-main); margin-top: 1.5rem; margin-bottom: 0.5rem; padding-bottom: 0.5rem; border-bottom: 2px dashed var(--border-color); font-weight: 600; }
        .category-section-title:first-child { margin-top: 0; }

        .menu-card { background: var(--card-bg); border-radius: 12px; padding: 1.5rem; box-shadow: var(--shadow-sm); display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--border-color); transition: transform 0.2s ease, box-shadow 0.2s ease; position: relative; overflow: hidden; }
        .menu-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--primary-color); opacity: 0; transition: opacity 0.2s ease; }
        .menu-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }
        .menu-card:hover::before { opacity: 1; }
        .menu-card h3 { font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--text-main); font-weight: 500; line-height: 1.4; }
        .menu-card .price { color: var(--danger-color); font-weight: 600; font-size: 1.3rem; margin-bottom: 1.2rem; }
        
        .add-btn { background-color: var(--bg-color); color: var(--primary-hover); border: 1px solid var(--primary-color); padding: 0.6rem; border-radius: 8px; cursor: pointer; font-weight: 500; transition: all 0.2s ease; width: 100%; font-size: 0.95rem; }
        .add-btn:hover { background-color: var(--primary-color); color: white; }

        .cart-section { width: 320px; background: var(--card-bg); padding: 1.5rem; border-left: 1px solid var(--border-color); display: flex; flex-direction: column; box-shadow: -2px 0 5px rgba(0,0,0,0.02); z-index: 5; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 2px dashed var(--border-color); }
        .cart-header h2 { font-size: 1.3rem; color: var(--text-main); display: flex; align-items: center; gap: 0.5rem; }
        .close-cart-btn { display: none; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); }

        .cart-items { flex: 1; overflow-y: auto; list-style: none; margin-bottom: 1rem; padding-right: 0.5rem; }
        .cart-items::-webkit-scrollbar { width: 5px; }
        .cart-items::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 0; border-bottom: 1px solid var(--border-color); }
        .cart-item-info { flex: 1; padding-right: 10px; }
        .cart-item-info strong { font-weight: 500; font-size: 0.95rem; color: var(--text-main); display: block; margin-bottom: 0.2rem;}
        .cart-item-info small { color: var(--text-muted); font-size: 0.85rem;}
        
        .cart-item-actions { display: flex; align-items: center; gap: 0.5rem; background: var(--bg-color); padding: 0.2rem; border-radius: 6px; }
        .cart-btn { background: white; border: 1px solid var(--border-color); width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; font-weight: 500; color: var(--text-main); transition: 0.2s; }
        .cart-btn:hover { background: #e2e8f0; }
        .cart-item-actions span { font-size: 0.9rem; font-weight: 500; width: 16px; text-align: center; }

        .cart-total { margin-top: auto; padding-top: 1rem; border-top: 2px dashed var(--border-color); }
        .cart-total h3 { display: flex; justify-content: space-between; font-size: 1.3rem; color: var(--text-main); margin-bottom: 1rem; font-weight: 600; }
        .checkout-btn { width: 100%; background-color: var(--success-color); color: white; border: none; padding: 1rem; font-size: 1.1rem; font-weight: 500; border-radius: 8px; cursor: pointer; transition: 0.2s; box-shadow: var(--shadow-sm); }
        .checkout-btn:hover:not(:disabled) { background-color: #059669; }
        .checkout-btn:active:not(:disabled) { transform: scale(0.98); }
        .checkout-btn:disabled { background-color: #9ca3af; cursor: not-allowed; box-shadow: none; }

        .floating-cart-btn { display: none; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); justify-content: center; align-items: center; z-index: 1000; padding: 1rem; }
        .modal-content { background: white; padding: 2rem; border-radius: 16px; width: 100%; max-width: 480px; max-height: 85vh; display: flex; flex-direction: column; box-shadow: var(--shadow-lg); animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .modal-content h2 { text-align: center; font-size: 1.5rem; margin-bottom: 1.5rem; padding-bottom: 1rem; color: var(--text-main); border-bottom: 2px dashed var(--border-color); }
        #order-summary { overflow-y: auto; flex: 1; margin-bottom: 1.5rem; padding: 0.5rem; }
        #order-summary::-webkit-scrollbar { width: 4px; }
        #order-summary::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .summary-item { display: flex; justify-content: space-between; padding: 0.6rem 0; border-bottom: 1px solid #f1f5f9; color: var(--text-main); font-size: 0.95rem; }
        
        .table-input-container { margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem; }
        .table-input-container label { font-weight: 600; color: var(--text-main); font-size: 1.1rem; white-space: nowrap; }
        .table-input-container input { flex: 1; padding: 0.8rem; border: 1px solid var(--border-color); border-radius: 8px; font-size: 1.1rem; }
        .table-input-container input:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2); }

        .modal-total-box { font-size: 1.4rem; font-weight: 600; text-align: center; color: var(--danger-color); border-top: 2px dashed var(--border-color); padding-top: 1.5rem; margin-bottom: 1.5rem; }
        .modal-actions { display: flex; justify-content: space-between; gap: 1rem; }
        .modal-btn { flex: 1; padding: 0.8rem; border: none; border-radius: 8px; cursor: pointer; font-size: 1.05rem; font-weight: 500; transition: 0.2s; }
        .btn-cancel { background: #fef2f2; color: var(--danger-color); border: 1px solid #fca5a5; }
        .btn-cancel:hover { background: #fee2e2; }
        .btn-confirm { background: var(--success-color); color: white; box-shadow: var(--shadow-sm); }
        .btn-confirm:hover { background: #059669; }
        .success-icon { font-size: 4rem; margin-bottom: 1rem; animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        @media (max-width: 768px) {
            header { padding: 1rem; }
            header h1 { font-size: 1.3rem; }
            .container { flex-direction: column; }
            
            .sidebar { width: 100%; padding: 0.5rem 1rem; border-right: none; border-bottom: 1px solid var(--border-color); height: auto; }
            .sidebar h2 { display: none; }
            #category-list { display: flex; flex-direction: row; overflow-x: auto; gap: 0.5rem; padding-bottom: 0.5rem; }
            #category-list::-webkit-scrollbar { height: 3px; }
            #category-list::-webkit-scrollbar-thumb { background: var(--primary-color); border-radius: 10px; }
            .category-btn { margin-bottom: 0; white-space: nowrap; width: auto; flex: 0 0 auto; padding: 0.5rem 1rem; font-size: 0.9rem; }
            
            .main-content { padding: 1rem; flex: 1; }
            .main-content h2 { font-size: 1.3rem; margin-bottom: 1rem; }
            .menu-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.8rem; }
            .category-section-title { font-size: 1.1rem; margin-top: 1rem; }
            .menu-card { padding: 1rem; }
            .menu-card h3 { font-size: 0.95rem; }
            .menu-card .price { font-size: 1.1rem; margin-bottom: 0.8rem; }
            .add-btn { font-size: 0.85rem; padding: 0.4rem; }
            
            .floating-cart-btn { display: flex; justify-content: center; align-items: center; position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background-color: var(--primary-color); color: white; border-radius: 50%; font-size: 1.5rem; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4); border: none; z-index: 90; cursor: pointer; transition: transform 0.2s; }
            .floating-cart-btn:active { transform: scale(0.9); }
            .cart-badge { position: absolute; top: -5px; right: -5px; background-color: var(--danger-color); color: white; font-size: 0.85rem; font-weight: bold; width: 24px; height: 24px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid white; }

            .cart-section { position: fixed; bottom: -100%; left: 0; width: 100%; height: 80vh; border-left: none; border-radius: 20px 20px 0 0; padding: 1.5rem; z-index: 95; box-shadow: 0 -10px 20px rgba(0,0,0,0.15); transition: bottom 0.3s ease-in-out; }
            .cart-section.open { bottom: 0; }
            .close-cart-btn { display: block; }
            
            .modal-content { padding: 1.5rem 1rem; width: 95%; }
            .modal-total-box { font-size: 1.2rem; padding-top: 1rem; margin-bottom: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>สวนอาหาร 20 เหรียญ</h1>
    </header>

    <div class="container">
        <aside class="sidebar">
            <h2>หมวดหมู่เมนู</h2>
            <div id="category-list"></div>
        </aside>

        <main class="main-content">
            <h2 id="current-category-title">ทั้งหมด</h2>
            <div class="menu-grid" id="menu-grid"></div>
        </main>

        <aside class="cart-section" id="cart-section">
            <div class="cart-header">
                <h2>🛒 ตะกร้าสินค้า</h2>
                <button class="close-cart-btn" onclick="toggleMobileCart()">✕</button>
            </div>
            <ul class="cart-items" id="cart-items-list">
                <li style="text-align:center; color:var(--text-muted); margin-top:3rem; font-size: 0.95rem;">ยังไม่มีสินค้าในตะกร้า</li>
            </ul>
            <div class="cart-total">
                <h3>ยอดรวม: <span><span id="total-price">0</span> ฿</span></h3>
                <button class="checkout-btn" id="checkout-btn" onclick="openModal()" disabled>ตรวจสอบรายการสั่งซื้อ</button>
            </div>
        </aside>
    </div>

    <button class="floating-cart-btn" onclick="toggleMobileCart()">
        🛒
        <span class="cart-badge" id="mobile-cart-badge">0</span>
    </button>

    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <h2>📝 สรุปรายการสั่งซื้อ</h2>
            <div id="order-summary"></div>
            
            <div class="table-input-container">
                <label for="table-number">เบอร์โต๊ะ:</label>
                <input type="text" id="table-number" placeholder="ระบุโต๊ะที่นั่ง" required>
            </div>

            <div class="modal-total-box">
                ยอดรวมต้องชำระ: <span id="modal-total-price">0</span> บาท
            </div>
            <div class="modal-actions">
                <button class="modal-btn btn-cancel" onclick="closeModal()">ยกเลิก</button>
                <button class="modal-btn btn-confirm" onclick="confirmOrder()">ยืนยันการสั่งซื้อ</button>
            </div>
        </div>
    </div>

    <div id="success-modal" class="modal">
        <div class="modal-content" style="text-align: center; max-width: 400px; padding: 3rem 2rem;">
            <div class="success-icon">✅</div>
            <h2 style="border-bottom: none; margin-bottom: 0.5rem; padding-bottom: 0; color: var(--success-color);">สั่งซื้อสำเร็จ!</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 1.1rem;">ออเดอร์ของคุณถูกส่งไปยังครัวเรียบร้อยแล้ว</p>
            <button class="modal-btn btn-confirm" style="width: 100%;" onclick="closeSuccessModal()">ตกลง</button>
        </div>
    </div>

        function renderCategories() {
            const categoryList = document.getElementById('category-list');
            categoryList.innerHTML = '';
            categories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'category-btn';

        }

        function filterMenu(category, selectedBtn) {
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            if(selectedBtn) selectedBtn.classList.add('active');
            document.getElementById('current-category-title').textContent = category;
            const filteredItems = category === 'ทั้งหมด' ? menuData : menuData.filter(item => item.category === category);
            renderMenuItems(filteredItems, category);
        }

        function renderMenuItems(items, currentCategory = 'ทั้งหมด') {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            if (currentCategory === 'ทั้งหมด') {
                categories.forEach(cat => {
                    if (cat === 'ทั้งหมด') return;
                    const catItems = items.filter(item => item.category === cat);
                    if (catItems.length > 0) {
                        const title = document.createElement('h3');
                        title.className = 'category-section-title';
                        title.textContent = cat;
                        grid.appendChild(title);
                        catItems.forEach(item => grid.appendChild(createMenuCard(item)));
                    }
                });
            } else {
                items.forEach(item => grid.appendChild(createMenuCard(item)));
            }
        }

        function createMenuCard(item) {
            const card = document.createElement('div');
            card.className = 'menu-card';
            card.innerHTML = `
                <div><h3>${item.name}</h3><p class="price">${item.price} บาท</p></div>
                <button class="add-btn" onclick="addToCart('${item.id}')">+ เพิ่มลงตะกร้า</button>`;
            return card;
        }

        function addToCart(itemId) {
            const menuItem = menuData.find(item => item.id === itemId);
            const existingCartItem = cart.find(item => item.id === itemId);
            if (existingCartItem) existingCartItem.quantity += 1;
            else cart.push({ ...menuItem, quantity: 1 });
            updateCartUI();
        }

        function removeFromCart(itemId) {
            const itemIndex = cart.findIndex(item => item.id === itemId);
            if (itemIndex > -1) {
                if (cart[itemIndex].quantity > 1) cart[itemIndex].quantity -= 1;
                else cart.splice(itemIndex, 1);
            }
            updateCartUI();
        }

        function updateCartUI() {
            const cartList = document.getElementById('cart-items-list');
            const totalPriceEl = document.getElementById('total-price');
            const checkoutBtn = document.getElementById('checkout-btn');
            const mobileBadge = document.getElementById('mobile-cart-badge');
            
            cartList.innerHTML = '';
            let total = 0;
            let totalItemsCount = 0;

            if (cart.length === 0) {
                cartList.innerHTML = '<li style="text-align:center; color:var(--text-muted); margin-top:3rem; font-size: 0.95rem;">ยังไม่มีสินค้าในตะกร้า</li>';
                checkoutBtn.disabled = true;
            } else {
                checkoutBtn.disabled = false;
                cart.forEach(item => {
                    const itemTotal = item.price * item.quantity;
                    total += itemTotal;
                    totalItemsCount += item.quantity;

                    const li = document.createElement('li');
                    li.className = 'cart-item';
                    li.innerHTML = `
                        <div class="cart-item-info">
                            <strong>${item.name}</strong>
                            <small>${item.price} x ${item.quantity} = ${itemTotal.toLocaleString()} บ.</small>
                        </div>
                        <div class="cart-item-actions">
                            <button class="cart-btn" onclick="removeFromCart('${item.id}')">-</button>
                            <span>${item.quantity}</span>
                            <button class="cart-btn" onclick="addToCart('${item.id}')">+</button>
                        </div>
                    `;
                    cartList.appendChild(li);
                });
            }

            totalPriceEl.textContent = total.toLocaleString();
            mobileBadge.textContent = totalItemsCount;
            if(totalItemsCount > 0) mobileBadge.style.display = 'flex';
            else mobileBadge.style.display = 'none';
        }

        function toggleMobileCart() {
            document.getElementById('cart-section').classList.toggle('open');
        }

        function openModal() {
            document.getElementById('cart-section').classList.remove('open');
            const modal = document.getElementById('checkout-modal');
            const orderSummary = document.getElementById('order-summary');
            const modalTotalPrice = document.getElementById('modal-total-price');
            
            document.getElementById('table-number').value = '';
            
            orderSummary.innerHTML = '';
            let total = 0;

            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                const div = document.createElement('div');
                div.className = 'summary-item';
                div.innerHTML = `<span>${item.name} <span style="color:var(--text-muted)">(x${item.quantity})</span></span><span style="font-weight:500;">${itemTotal.toLocaleString()} ฿</span>`;
                orderSummary.appendChild(div);
            });

            modalTotalPrice.textContent = total.toLocaleString();
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('checkout-modal').style.display = 'none'; }

        function confirmOrder() {
            const tableNumber = document.getElementById('table-number').value;

            if (!tableNumber) {
                alert('กรุณาระบุเบอร์โต๊ะก่อนยืนยันการสั่งซื้อครับ 😅');
                document.getElementById('table-number').focus();
                return; 
            }

            closeModal();
            
            if (cart.length > 0) {
                const orderTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                const orderData = {
                    id: 'ORD-' + Math.floor(1000 + Math.random() * 9000),
                    table: tableNumber,
                    time: new Date().toLocaleTimeString('th-TH'),
                    items: [...cart],
                    total: orderTotal
                };

                let existingOrders = JSON.parse(localStorage.getItem('restaurantOrders')) || [];
                existingOrders.push(orderData);
                localStorage.setItem('restaurantOrders', JSON.stringify(existingOrders));
            }

            cart = [];
            updateCartUI();
            document.getElementById('success-modal').style.display = 'flex';
        }

        function closeSuccessModal() { document.getElementById('success-modal').style.display = 'none'; }

        renderCategories();
        renderMenuItems(menuData, 'ทั้งหมด');
        updateCartUI();

    </script>
</body>
</html>
